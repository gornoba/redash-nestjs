services:
  postgres:
    image: postgres:17.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: new_redash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d new_redash"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
      args:
        APP_NAME: api
    init: true
    command: npx nest start api -w --no-shell
    ports:
      - "4000:4000"
    volumes:
      - ./backend/apps/api/src:/app/apps/api/src
      - ./backend/libs:/app/libs
    environment:
      - NODE_ENV=development
      - PORT=4000
    stop_signal: SIGTERM
    stop_grace_period: 10s
    env_file:
      - ./backend/.env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').request('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) }).end()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  alert:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
      args:
        APP_NAME: alert
    init: true
    command: npx nest start alert -w --no-shell
    volumes:
      - ./backend/apps/alert/src:/app/apps/alert/src
      - ./backend/libs:/app/libs
    environment:
      - NODE_ENV=development
      - PORT=4001
    stop_signal: SIGTERM
    stop_grace_period: 10s
    env_file:
      - ./backend/.env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').request('http://localhost:4001/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) }).end()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  schedule:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
      args:
        APP_NAME: schedule
    init: true
    command: npx nest start schedule -w --no-shell
    volumes:
      - ./backend/apps/schedule/src:/app/apps/schedule/src
      - ./backend/libs:/app/libs
    environment:
      - NODE_ENV=development
      - PORT=4002
    stop_signal: SIGTERM
    stop_grace_period: 10s
    env_file:
      - ./backend/.env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').request('http://localhost:4002/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) }).end()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
      args:
        APP_NAME: worker
    init: true
    command: npx nest start worker -w --no-shell
    volumes:
      - ./backend/apps/worker/src:/app/apps/worker/src
      - ./backend/libs:/app/libs
    environment:
      - NODE_ENV=development
      - PORT=4003
    stop_signal: SIGTERM
    stop_grace_period: 10s
    env_file:
      - ./backend/.env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').request('http://localhost:4003/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) }).end()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://api:4000
      - NEXT_PUBLIC_API_BASE_URL=http://api:4000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
